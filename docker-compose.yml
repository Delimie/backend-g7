version: "3.8"

services:
  db:
    image: mysql:8
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: peep_db
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  backend:
    image: backend-test
    container_name: backend-app
    restart: always
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: mysql://root:1234@db:3306/peep_db

    # This use to run command before npm run start
    command: sh -c "npm install &&  npx prisma db push && npm run start"

volumes:
  mysql-data:

# docker-compose up  //command to run
# docker-compose up --build // to build new mySql db attach to backend image